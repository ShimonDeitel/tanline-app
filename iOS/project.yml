name: Tanline
options:
  bundleIdPrefix: com.shimondeitel.tanline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tanline:
    type: application
    platform: iOS
    sources:
      - path: Tanline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tanline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tanline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TanlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TanlineTests
      - path: Tanline.storekit
    dependencies:
      - target: Tanline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tanline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TanlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TanlineUITests
    dependencies:
      - target: Tanline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tanline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tanline:
    build:
      targets:
        Tanline: all
        TanlineTests: [test]
        TanlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tanline.storekit
    test:
      config: Debug
      storeKitConfiguration: Tanline.storekit
      targets:
        - TanlineTests
        - TanlineUITests
    archive:
      config: Release
